- title: Projects and Research
  type: time_table
  contents:
    - title: Vector-Graph Hybrid RAG Methods
      year: July 2024
      items:
        - A collection of all available Graph-Vector Hybrid RAG Approaches, with custom versions born out of curiosity, 
          a quickly implementable interface, data connectors, visualisers and performance benchmarks.
        - Born out of the need to handle holistic, interrelated systems data which cannot directly be handled by LLMs,
          both due to limited retrieval abilities for complex relationships and context length issues when it's a thousand
          nodes at once.
    - title: Celestial Navigation with Deep Learning
      year: December 2023
      items:
        - Implemented a Marine Navigation system using computer vision and deep learning, employing a CNN with Haversine
          Loss and Monte Carlo Dropout to achieve sub-1 nautical mile positional accuracy.
        - Tech - Python, Skyfield, TensorFlow, CNN, Haversine Loss, Monte Carlo Dropout.
    - title: Implementation of the Bayesian Flow Networks paper
      year: December 2023
      items:
        - BFNs merge Bayesian Flow Networks and residual blocks for robust learning on extensive datasets. Played around
          with some hypotheses and tested BFNs for text generation.
          Tech - Python, TensorFlow, PyTorch.
    - title: Vision - Navigational Aid for Visually Impaired
      year: December 2023
      items:
        - Engineered a comprehensive navigation system for visually impaired individuals in India, akin to Google Maps' 
          live view. Leveraged object detection, multimodal models, visual question answering, semantic segmentation, 
          and fusion models.
        - Tech - TensorFlow, OpenCV, YOLOv7, SpaCy, KerasNLP, KerasCV.
        - Met awesome people during this project!
    - title: Soundscapes - Analysis of Music on Individuals with Intellectual & Development Disorders
      year: December 2023
      items:
        - Addressed the challenge of early diagnosis by distinguishing EEG patterns of individuals with IDD and Typically
          Developing Controls (TDC). Achieved a 96% accuracy with SVM and identified IDD using LSTM. Explored emotional
          responses from EEG data for personalized music therapy, emphasizing the significance of early detection and 
          tailored interventions.
        - Implemented models - LSTM, GNB, KNN, Random Forest, SVM, QDA, using TensorFlow, Keras, scikit-learn, numpy, 
          matplotlib, pandas, seaborn, and scipy.
        - Another project close to my heart due to the implications it had.
    - title: Robotouille - Fine-tuned Culinary Robots
      year: December 2023
